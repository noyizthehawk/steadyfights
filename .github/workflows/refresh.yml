name: Weekly data refresh

on:
  schedule:
    - cron: '0 12 * * 0' # every Sunday 12:00 UTC (Sunday morning US time)
  workflow_dispatch: # adds a manual "Run workflow" button for testing

permissions:
  contents: write # the job pushes the refreshed CSVs back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh pipeline
        run: python refresh_data.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Uncleaned/ csv/
          # Only commit if the refresh actually changed something (no event = no changes)
          git diff --cached --quiet || git commit -m "Weekly data refresh"
          git push
